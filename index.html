<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AIP PokeMMO公会墙</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f5f5f5;
        }
        /* 首页背景及遮罩 */
        .hero {
            position: relative;
            height: 100vh;
            background: url('resource/background/background.webp') center center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1;
        }
        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #fff;
        }
        .hero-logo {
            width: 120px;
            margin-bottom: 24px;
        }
        .hero-title {
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 4px;
        }
        .hero-subtitle {
            font-size: 1.5rem;
            margin-top: 12px;
            opacity: 0.85;
        }
        /* 名人堂 */
        .hall-of-fame {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            padding: 60px 0 40px 0;
        }
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
        }
        .tab {
            padding: 12px 32px;
            margin: 0 8px;
            background: #fff;
            border-radius: 24px 24px 0 0;
            cursor: pointer;
            font-weight: bold;
            color: #3a3a3a;
            border-bottom: 3px solid transparent;
            transition: background 0.2s, border-bottom 0.2s;
        }
        .tab.active {
            background: #1976d2;
            color: #fff;
            border-bottom: 3px solid #1976d2;
        }
        .tab-content {
            display: none;
            width: 80vw;
            max-width: 1200px;
            margin: 0 auto;
            overflow-x: auto;
            overflow-y: visible;
            white-space: nowrap;
            padding-bottom: 8px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .tab-content::-webkit-scrollbar {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .member-card {
            display: inline-block;
            vertical-align: top;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 24px;
            width: 260px;
            min-height: 220px;
            box-sizing: border-box;
            text-align: center;
            margin-right: 32px;
            overflow: hidden;
        }
        .member-card:last-child {
            margin-right: 0;
        }
        .member-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 12px;
            border: 2px solid #1976d2;
        }
        .member-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .member-join {
            font-size: 0.95rem;
            color: #888;
            margin-bottom: 10px;
        }
        .member-desc {
            font-size: 0.98rem;
            color: #444;
            word-break: break-all;
            white-space: normal;
            overflow-wrap: break-word;
            min-height: 4.6em;
            max-height: 4.6em;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        @media (max-width: 900px) {
            .tab-content {
            width: 98vw;
            padding-left: 2vw;
            padding-right: 2vw;
            }
            .member-card {
            width: 80vw;
            min-width: 220px;
            max-width: 320px;
            min-height: 220px;
            }
        }
        .member-honor-list {
                text-align: left;
                margin: 10px 0 0 0;
                padding-left: 20px;
                font-size: 0.98rem;
                color: #444;
                line-height: 1.5;
                max-height: none;
                overflow: visible;
                word-break: break-all;
                white-space: normal;
            }
            .member-honor-list li {
                margin-bottom: 2px;
                word-break: break-all;
                white-space: normal;
            }
        /* 照片墙 */
        .gallery {
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            padding: 60px 0 40px 0;
        }
        .gallery-container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            min-height: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }
        .gallery-photo {
            height: 400px;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
            display: block;
            margin: 0 auto;
        }
        .gallery-info {
            margin-top: 16px;
            text-align: center;
            color: #333;
        }
        .gallery-controls {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 12px;
        }
        .gallery-btn {
            background: #1976d2;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .gallery-btn:hover {
            background: #125ea2;
        }
        /* 荣誉墙 */
        .honor-timeline {
                position: relative;
                max-width: 700px;
                margin: 0 auto;
                padding: 32px 0 32px 0;
            }
            .honor-timeline::before {
                content: '';
                position: absolute;
                left: 32px;
                top: 0;
                bottom: 0;
                width: 4px;
                background: linear-gradient(180deg,#ffe082 0%,#b8860b 100%);
                border-radius: 2px;
            }
            .honor-timeline-item {
                display: flex;
                align-items: flex-start;
                margin-bottom: 48px;
                position: relative;
            }
            .honor-timeline-dot {
                width: 18px;
                height: 18px;
                background: #b8860b;
                border: 3px solid #fffbe6;
                border-radius: 50%;
                position: relative;
                left: 24px;
                top: 8px;
                z-index: 2;
                box-shadow: 0 2px 8px rgba(184,134,11,0.15);
            }
            .honor-timeline-content {
                background: #fff;
                border-radius: 12px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.06);
                padding: 20px 28px;
                margin-left: 48px;
                min-width: 0;
                flex: 1;
                position: relative;
            }
            .honor-timeline-time {
                font-size: 1.05rem;
                color: #b8860b;
                font-weight: bold;
                margin-bottom: 8px;
            }
            .honor-timeline-img {
                width: 100%;
                max-width: 320px;
                border-radius: 8px;
                margin-bottom: 12px;
                box-shadow: 0 2px 8px rgba(184,134,11,0.08);
                display: block;
            }
            .honor-title {
                font-size: 1.1rem;
                font-weight: bold;
                margin-bottom: 6px;
                color: #b8860b;
            }
            .honor-desc {
                font-size: 0.98rem;
                color: #444;
            }
            @media (max-width: 600px) {
                .honor-timeline-content {
                    padding: 14px 10px;
                }
                .honor-timeline-img {
                    max-width: 98vw;
                }
                .honor-timeline::before {
                    left: 12px;
                }
                .honor-timeline-dot {
                    left: 4px;
                }
                .honor-timeline-item {
                    margin-bottom: 32px;
                }
            }
        .honor-wall {
            background: linear-gradient(135deg, #fdf6e3 0%, #f5e6ca 100%);
            padding: 60px 0 40px 0;
        }
        .honor-list {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
            justify-content: center;
        }
        .honor-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 24px 32px;
            min-width: 220px;
            text-align: center;
        }
        /* 活动记录 */
        .activity-records {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            padding: 60px 0 60px 0;
        }
        .activity-accordion {
            max-width: 900px;
            margin: 0 auto;
        }
        .activity-year {
            margin-bottom: 18px;
            border-radius: 10px;
            background: rgba(255,255,255,0.7);
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .activity-year-header {
            font-size: 1.15rem;
            font-weight: bold;
            color: #7b1fa2;
            padding: 12px 18px;
            cursor: pointer;
            user-select: none;
            border-radius: 10px 10px 0 0;
            background: #f3e8fd;
            transition: background 0.2s;
        }
        .activity-year-header:hover {
            background: #e1c8fa;
        }
        .activity-list {
            display: none;
        }
        .activity-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 24px;
            display: flex;
            margin-top: 12px;
            flex-wrap: wrap;
            gap: 24px;
            align-items: center;
        }
        .activity-info {
            flex: 1 1 220px;
        }
        .activity-title {
            font-size: 1.15rem;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .activity-time {
            font-size: 0.95rem;
            color: #888;
            margin-bottom: 10px;
        }
        .activity-desc {
            font-size: 0.98rem;
            color: #444;
        }
        .activity-img {
            width: 180px;
            max-width: 100%;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
        }
        .activity-top4 {
            margin: 10px 0 0 0;
            padding-left: 18px;
            font-size: 1rem;
            color: #444;
            list-style: none;
        }
        .activity-top4 li {
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .medal {
            font-size: 1.1em;
            font-weight: bold;
            width: 1.6em;
            display: inline-block;
            text-align: center;
        }
        .medal.gold { color: #e6b800; }
        .medal.silver { color: #b0b0b0; }
        .medal.bronze { color: #c97a4b; }
        .activity-more-link {
            display: inline-block;
            margin: 12px 0 0 0;
            color: #7b1fa2;
            font-weight: bold;
            text-decoration: none;
            border-radius: 6px;
            padding: 6px 16px;
            background: #f3e8fd;
            transition: background 0.2s;
        }
        .activity-more-link:hover {
            background: #e1c8fa;
        }
        @media (max-width: 900px) {
            .tab-content.active, .honor-list, .activity-list {
                flex-direction: column;
                align-items: center;
            }
            .activity-card {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <section class="hero" id="hero">
        <div class="hero-content">
        </div>
    </section>

    <section class="hall-of-fame" id="hall-of-fame">
        <h2 id="hall-of-fame-title" style="text-align:center;font-size:2rem;margin-bottom:24px;color:#1976d2;"></h2>
        <div class="tabs" id="tabs">
        </div>
        <div id="tab-contents">
        </div>
    </section>

    <section class="gallery" id="gallery">
        <h2 id="gallery-title" style="text-align:center;font-size:2rem;margin-bottom:24px;color:#d72660;"></h2>
        <div class="gallery-container">
            <img class="gallery-photo" id="gallery-photo" alt="公会合影">
            <div class="gallery-info" id="gallery-info">
            </div>
            <div class="gallery-controls">
                <button class="gallery-btn" id="gallery-prev">&#8592;</button>
                <button class="gallery-btn" id="gallery-next">&#8594;</button>
            </div>
        </div>
    </section>

    <section class="honor-wall" id="honor-wall">
        <h2 id="honor-wall-title" style="text-align:center;font-size:2rem;margin-bottom:24px;color:#b8860b;"></h2>
        <div class="honor-timeline" id="honor-timeline">
        </div>
    </section>

    <section class="activity-records" id="activity-records">
        <h2 id="activity-records-title" style="text-align:center;font-size:2rem;margin-bottom:24px;color:#7b1fa2;"></h2>
        <div class="activity-accordion" id="activity-accordion">
        </div>
    </section>

    <script src="data.js"></script>
    <script>
        let data = siteData;
        let currentGalleryIndex = 0;

        function renderPage() {
            renderHero();
            renderHallOfFame();
            renderGallery();
            renderHonorWall();
            renderActivityRecords();
            initEventListeners();
        }

        function renderHero() {
            const heroContent = document.querySelector('.hero-content');
            heroContent.innerHTML = `
                <img src="${data.site.hero.logo}" alt="AIP LOGO" class="hero-logo">
                <div class="hero-title">${data.site.hero.title}</div>
                <div class="hero-subtitle">${data.site.hero.subtitle}</div>
            `;
        }

        function renderHallOfFame() {
            document.getElementById('hall-of-fame-title').textContent = data.hallOfFame.title;
            
            const tabsContainer = document.getElementById('tabs');
            tabsContainer.innerHTML = Object.entries(data.hallOfFame.tabs).map(([key, label], index) => `
                <div class="tab ${index === 0 ? 'active' : ''}" data-tab="${key}">${label}</div>
            `).join('');

            const tabContentsContainer = document.getElementById('tab-contents');
            tabContentsContainer.innerHTML = Object.entries(data.hallOfFame.tabs).map(([key, label], index) => {
                let members = [];
                if (key === 'leaders') members = data.hallOfFame.leaders;
                else if (key === 'honors') members = data.hallOfFame.honors;
                else if (key === 'core') members = data.hallOfFame.core;

                const membersHTML = members.map(member => {
                    if (key === 'honors' && member.honors) {
                        return `
                            <div class="member-card">
                                <img src="${member.img}" class="member-img" alt="${member.name}">
                                <div class="member-name">${member.name}</div>
                                <div class="member-join">${member.join}</div>
                                <ul class="member-honor-list">
                                    ${member.honors.map(honor => `<li>${honor}</li>`).join('')}
                                </ul>
                            </div>
                        `;
                    } else {
                        return `
                            <div class="member-card">
                                <img src="${member.img}" class="member-img" alt="${member.name}">
                                <div class="member-name">${member.name}</div>
                                <div class="member-join">${member.join}</div>
                                <div class="member-desc">${member.desc}</div>
                            </div>
                        `;
                    }
                }).join('');

                return `<div class="tab-content ${index === 0 ? 'active' : ''}" id="tab-${key}">${membersHTML}</div>`;
            }).join('');
        }

        function renderGallery() {
            document.getElementById('gallery-title').textContent = data.gallery.title;
            updateGalleryPhoto();
        }

        function updateGalleryPhoto() {
            const photo = data.gallery.photos[currentGalleryIndex];
            document.getElementById('gallery-photo').src = photo.src;
            document.getElementById('gallery-info').innerHTML = `
                <div>${photo.time}</div>
                <div>${photo.desc}</div>
            `;
        }

        function renderHonorWall() {
            document.getElementById('honor-wall-title').textContent = data.honorWall.title;
            const timelineContainer = document.getElementById('honor-timeline');
            timelineContainer.innerHTML = data.honorWall.timeline.map(item => `
                <div class="honor-timeline-item">
                    <div class="honor-timeline-dot"></div>
                    <div class="honor-timeline-content">
                        <div class="honor-timeline-time">${item.time}</div>
                        <img src="${item.img}" alt="${item.title}" class="honor-timeline-img">
                        <div class="honor-title">${item.title}</div>
                        <div class="honor-desc">${item.desc}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderActivityRecords() {
            document.getElementById('activity-records-title').textContent = data.activityRecords.title;
            const accordionContainer = document.getElementById('activity-accordion');
            accordionContainer.innerHTML = data.activityRecords.years.map(yearData => {
                const activitiesHTML = yearData.activities.map(activity => {
                    let top4HTML = activity.top4 ? activity.top4.map(item => `
                        <li><span class="medal ${item.medal}">${item.medal === 'gold' ? '🥇' : item.medal === 'silver' ? '🥈' : '🥉'}</span> ${item.name}</li>
                    `).join('') : '';

                    let subTiersHTML = activity.subTiers ? activity.subTiers.map(subTier => {
                        let subTop4HTML = subTier.top4 ? subTier.top4.map(item => `
                            <li><span class="medal ${item.medal}">${item.medal === 'gold' ? '🥇' : item.medal === 'silver' ? '🥈' : '🥉'}</span> ${item.name}</li>
                        `).join('') : '';
                        return `
                            <div class="activity-desc">${subTier.name}${subTier.desc}</div>
                            <ol class="activity-top4">${subTop4HTML}</ol>
                        `;
                    }).join('') : '';

                    let linksHTML = activity.links ? activity.links.map(link => `
                        <a class="activity-more-link" href="${link.url}" target="_blank">${link.text}</a>
                    `).join('') : '';

                    return `
                        <div class="activity-card">
                            <div class="activity-info">
                                <div class="activity-title">${activity.title}</div>
                                <div class="activity-time">${activity.time}</div>
                                <div class="activity-desc">${activity.desc}</div>
                                ${top4HTML ? `<ol class="activity-top4">${top4HTML}</ol>` : ''}
                                ${subTiersHTML}
                                ${linksHTML}
                            </div>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="activity-year">
                        <div class="activity-year-header" onclick="toggleActivityYear(this)">${yearData.year} ${yearData.expanded ? '▲' : '▼'}</div>
                        <div class="activity-list" style="display:${yearData.expanded ? 'block' : 'none'};">
                            ${activitiesHTML}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function initEventListeners() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    const tabId = this.getAttribute('data-tab');
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById(`tab-${tabId}`).classList.add('active');
                });
            });

            document.getElementById('gallery-prev').addEventListener('click', function() {
                currentGalleryIndex = (currentGalleryIndex - 1 + data.gallery.photos.length) % data.gallery.photos.length;
                updateGalleryPhoto();
            });

            document.getElementById('gallery-next').addEventListener('click', function() {
                currentGalleryIndex = (currentGalleryIndex + 1) % data.gallery.photos.length;
                updateGalleryPhoto();
            });
        }

        function toggleActivityYear(header) {
            const list = header.nextElementSibling;
            const isExpanded = list.style.display === 'block';
            list.style.display = isExpanded ? 'none' : 'block';
            const yearText = header.textContent.replace(/[▲▼]/g, '').trim();
            header.textContent = yearText + ' ' + (isExpanded ? '▼' : '▲');
        }

        document.addEventListener('DOMContentLoaded', renderPage);
    </script>
</body>
</html>
